apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: college-event-management-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: MONGO_DB_URL
              value: "mongodb://rahulm6124_db_user:A0QLJCvoAAcPZRFk@ac-fagb9zm-shard-00-00.jt8qvha.mongodb.net:27017,ac-fagb9zm-shard-00-01.jt8qvha.mongodb.net:27017,ac-fagb9zm-shard-00-02.jt8qvha.mongodb.net:27017/mydb?ssl=true&replicaSet=atlas-935lc9-shard-0&authSource=admin&retryWrites=true&w=majority"
            - name: JWT_SECRET
              value: "rahul@123"
---
